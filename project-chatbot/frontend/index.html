<!DOCTYPE html>
<html>
<head>
    <title>Her First 💗</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #fff6f8;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #ffe3ea;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #ff6b81;
        }

        .menu button {
            background: none;
            border: none;
            padding: 10px;
            text-align: left;
            border-radius: 10px;
            cursor: pointer;
        }

        .menu button:hover {
            background: #ffd1dc;
        }

        /* Main area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            font-size: 20px;
            color: #444;
        }

        .chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            max-width: 60%;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .user {
            background: #ffccd5;
            margin-left: auto;
        }

        .bot {
            background: #ffffff;
            border: 1px solid #eee;
        }

        /* Input */
        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        button.send {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #ff6b81;
            color: white;
            border-radius: 50%;
            cursor: pointer;
        }

        button.send:hover {
            background: #ff4d6d;
        }

        .upload {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <div class="logo">Her First 🌸</div>

    <div class="menu">
        <button>💬 Chat</button>
        <button>📚 Learn</button>
        <button>💖 Self Care</button>
    </div>

</div>

<div class="main">
    <div class="header">
        Hi there 💕 You can ask anything about your body or your period
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="question" placeholder="Ask anything..." />
        <button class="send" onclick="ask()">➤</button>
    </div>
</div>

<script>


async function ask() {
    const input = document.getElementById("question");
    const chat = document.getElementById("chat");

    const question = input.value;

    chat.innerHTML += `<div class="message user">${question}</div>`;

    try {
        const response = await fetch(`http://127.0.0.1:8000/ask?question=${encodeURIComponent(question)}`);
        const data = await response.json();

        console.log("API RESPONSE:", data);

        if (data.answer) {
            chat.innerHTML += `<div class="message bot">${data.answer}</div>`;
        } else {
            chat.innerHTML += `<div class="message bot">⚠️ No answer received</div>`;
        }

    } catch (error) {
        console.error("ERROR:", error);
        chat.innerHTML += `<div class="message bot">⚠️ Error connecting to server</div>`;
    }

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
